    <path d="M -22 4 L 0 -18 L 22 4 L 22 22 L -22 22 Z M -8 22 L -8 8 L 8 8 L 8 22"
          fill="none" stroke="#0F172A" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- TR: ABXY -->
  <g transform="translate(800, 220)" filter="url(#g-h4)">
    <circle cx="0" cy="-44" r="22" fill="url(#ac-h4)" opacity="0.9"/>
    <text x="0" y="-37" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">X</text>
    <circle cx="-44" cy="0" r="22" fill="url(#ac-h4)" opacity="0.82"/>
    <text x="-44" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">Y</text>
    <circle cx="44" cy="0" r="22" fill="url(#ac-h4)" opacity="0.82"/>
    <text x="44" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">A</text>
    <circle cx="0" cy="44" r="22" fill="url(#ac-h4)" opacity="0.72"/>
    <text x="0" y="51" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">B</text>
  </g>

  <!-- BL: stick -->
  <g transform="translate(220, 800)" filter="url(#g-h4)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#ac-h4)" stroke-width="6" opacity="0.7"/>
    <circle cx="0" cy="0" r="26" fill="url(#ac-h4)"/>
  </g>

  <!-- BR: D-pad -->
  <g transform="translate(800, 800)" filter="url(#g-h4)">
    <rect x="-50" y="-16" width="100" height="32" rx="16" fill="url(#ac-h4)"/>
    <rect x="-16" y="-50" width="32" height="100" rx="16" fill="url(#ac-h4)"/>
  </g>

  <!-- Center: EQ -->
  <g transform="translate(512, 540)" filter="url(#g-h4)">
    <rect x="-300" y="-50" width="40" height="100" rx="20" fill="url(#ac-h4)" opacity="0.55"/>
    <rect x="-220" y="-120" width="40" height="240" rx="20" fill="url(#ac-h4)" opacity="0.72"/>
    <rect x="-140" y="-200" width="48" height="400" rx="24" fill="url(#ac-h4)"/>
    <rect x="-52" y="-260" width="48" height="520" rx="24" fill="url(#ac-h4)"/>
    <rect x="36" y="-170" width="48" height="340" rx="24" fill="url(#ac-h4)" opacity="0.92"/>
    <rect x="124" y="-100" width="40" height="200" rx="20" fill="url(#ac-h4)" opacity="0.75"/>
    <rect x="204" y="-60" width="40" height="120" rx="20" fill="url(#ac-h4)" opacity="0.55"/>
