<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-s4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac-s4" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <filter id="g-s4"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg-s4)"/>

  <!-- TL: +/- pair -->
  <g transform="translate(220, 220)" filter="url(#g-s4)">
    <rect x="-58" y="-7" width="44" height="14" rx="7" fill="url(#ac-s4)" opacity="0.85"/>
    <rect x="14" y="-7" width="44" height="14" rx="7" fill="url(#ac-s4)" opacity="0.85"/>
    <rect x="29" y="-22" width="14" height="44" rx="7" fill="url(#ac-s4)" opacity="0.85"/>
  </g>

  <!-- TR: D-pad -->
  <g transform="translate(800, 220)" filter="url(#g-s4)">
    <rect x="-50" y="-16" width="100" height="32" rx="16" fill="url(#ac-s4)"/>
    <rect x="-16" y="-50" width="32" height="100" rx="16" fill="url(#ac-s4)"/>
  </g>

  <!-- BL: ABXY -->
  <g transform="translate(220, 800)" filter="url(#g-s4)">
    <circle cx="0" cy="-44" r="22" fill="url(#ac-s4)" opacity="0.9"/>
    <text x="0" y="-37" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">X</text>
    <circle cx="-44" cy="0" r="22" fill="url(#ac-s4)" opacity="0.82"/>
    <text x="-44" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">Y</text>
    <circle cx="44" cy="0" r="22" fill="url(#ac-s4)" opacity="0.82"/>
    <text x="44" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">A</text>
    <circle cx="0" cy="44" r="22" fill="url(#ac-s4)" opacity="0.72"/>
    <text x="0" y="51" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">B</text>
  </g>

  <!-- BR: stick -->
  <g transform="translate(800, 800)" filter="url(#g-s4)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#ac-s4)" stroke-width="6" opacity="0.7"/>
    <circle cx="0" cy="0" r="26" fill="url(#ac-s4)"/>
  </g>

  <!-- Center: EQ -->
  <g transform="translate(512, 540)" filter="url(#g-s4)">
    <rect x="-300" y="-50" width="40" height="100" rx="20" fill="url(#ac-s4)" opacity="0.55"/>
    <rect x="-220" y="-120" width="40" height="240" rx="20" fill="url(#ac-s4)" opacity="0.72"/>
    <rect x="-140" y="-200" width="48" height="400" rx="24" fill="url(#ac-s4)"/>
    <rect x="-52" y="-260" width="48" height="520" rx="24" fill="url(#ac-s4)"/>
    <rect x="36" y="-170" width="48" height="340" rx="24" fill="url(#ac-s4)" opacity="0.92"/>
    <rect x="124" y="-100" width="40" height="200" rx="20" fill="url(#ac-s4)" opacity="0.75"/>
    <rect x="204" y="-60" width="40" height="120" rx="20" fill="url(#ac-s4)" opacity="0.55"/>
  </g>
</svg>
