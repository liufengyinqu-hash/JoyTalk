<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-a" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac-a" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <filter id="g-a"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg-a)"/>
  <ellipse cx="512" cy="540" rx="380" ry="160" fill="#22D3EE" opacity="0.18"/>

  <!-- LEFT side: full Joy-Con stick + buttons cluster -->
  <g transform="translate(180, 512)" filter="url(#g-a)">
    <circle cx="0" cy="-110" r="40" fill="url(#ac-a)" opacity="0.85"/>
    <circle cx="-40" cy="-50" r="14" fill="#22D3EE" opacity="0.7"/>
    <circle cx="40" cy="-50" r="14" fill="#22D3EE" opacity="0.7"/>
    <circle cx="0" cy="-50" r="14" fill="#22D3EE" opacity="0.5"/>
  </g>

  <!-- RIGHT side: D-pad cluster -->
  <g transform="translate(844, 512)" filter="url(#g-a)">
    <rect x="-50" y="-110" width="20" height="40" rx="10" fill="url(#ac-a)" opacity="0.85"/>
    <rect x="-30" y="-130" width="40" height="20" rx="10" fill="url(#ac-a)" opacity="0.85"/>
  </g>

  <!-- Center: EQ bars -->
  <g transform="translate(512, 540)" filter="url(#g-a)">
    <rect x="-200" y="-70" width="36" height="140" rx="18" fill="url(#ac-a)" opacity="0.6"/>
    <rect x="-130" y="-130" width="36" height="260" rx="18" fill="url(#ac-a)" opacity="0.78"/>
    <rect x="-60" y="-200" width="44" height="400" rx="22" fill="url(#ac-a)"/>
    <rect x="20" y="-250" width="44" height="500" rx="22" fill="url(#ac-a)"/>
    <rect x="100" y="-180" width="44" height="360" rx="22" fill="url(#ac-a)" opacity="0.92"/>
    <rect x="180" y="-110" width="36" height="220" rx="18" fill="url(#ac-a)" opacity="0.78"/>
  </g>
</svg>
