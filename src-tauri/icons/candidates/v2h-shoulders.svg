<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-f" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac-f" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <filter id="g-f"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg-f)"/>

  <!-- Top cap: ZL/ZR shoulder bars (Joy-Con feel) -->
  <rect x="180" y="180" width="280" height="40" rx="20" fill="url(#ac-f)" opacity="0.7" filter="url(#g-f)"/>
  <rect x="564" y="180" width="280" height="40" rx="20" fill="url(#ac-f)" opacity="0.7" filter="url(#g-f)"/>

  <!-- Bottom: D-pad left + ABXY right -->
  <g transform="translate(220, 800)" filter="url(#g-f)" opacity="0.92">
    <rect x="-46" y="-14" width="92" height="28" rx="14" fill="url(#ac-f)"/>
    <rect x="-14" y="-46" width="28" height="92" rx="14" fill="url(#ac-f)"/>
  </g>
  <g transform="translate(804, 800)" filter="url(#g-f)">
    <circle cx="0" cy="-36" r="14" fill="url(#ac-f)"/>
    <circle cx="-36" cy="0" r="14" fill="url(#ac-f)" opacity="0.85"/>
    <circle cx="36" cy="0" r="14" fill="url(#ac-f)" opacity="0.85"/>
    <circle cx="0" cy="36" r="14" fill="url(#ac-f)" opacity="0.7"/>
  </g>

  <!-- Center large: EQ bars as the hero -->
  <ellipse cx="512" cy="540" rx="360" ry="180" fill="#22D3EE" opacity="0.16"/>
  <g transform="translate(512, 540)" filter="url(#g-f)">
    <rect x="-280" y="-60" width="40" height="120" rx="20" fill="url(#ac-f)" opacity="0.55"/>
    <rect x="-200" y="-130" width="40" height="260" rx="20" fill="url(#ac-f)" opacity="0.7"/>
    <rect x="-120" y="-200" width="48" height="400" rx="24" fill="url(#ac-f)" opacity="0.88"/>
    <rect x="-32" y="-260" width="48" height="520" rx="24" fill="url(#ac-f)"/>
    <rect x="56" y="-180" width="48" height="360" rx="24" fill="url(#ac-f)" opacity="0.9"/>
    <rect x="144" y="-110" width="40" height="220" rx="20" fill="url(#ac-f)" opacity="0.7"/>
    <rect x="224" y="-50" width="40" height="100" rx="20" fill="url(#ac-f)" opacity="0.55"/>
  </g>
</svg>
