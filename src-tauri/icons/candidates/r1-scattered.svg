<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-r1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac-r1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <filter id="g-r1"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg-r1)"/>

  <!-- TL: A button -->
  <g transform="translate(190, 200)" filter="url(#g-r1)">
    <circle cx="0" cy="0" r="30" fill="url(#ac-r1)" opacity="0.85"/>
    <text x="0" y="9" text-anchor="middle" font-size="28" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">A</text>
  </g>
  <!-- TL: minus -->
  <g transform="translate(280, 280)" filter="url(#g-r1)">
    <rect x="-22" y="-6" width="44" height="12" rx="6" fill="url(#ac-r1)" opacity="0.7"/>
  </g>

  <!-- TR: stick (R) -->
  <g transform="translate(820, 220)" filter="url(#g-r1)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#ac-r1)" stroke-width="6" opacity="0.7"/>
    <circle cx="0" cy="0" r="22" fill="url(#ac-r1)" opacity="0.9"/>
  </g>
  <!-- TR: plus -->
  <g transform="translate(720, 290)" filter="url(#g-r1)">
    <rect x="-22" y="-6" width="44" height="12" rx="6" fill="url(#ac-r1)" opacity="0.7"/>
    <rect x="-6" y="-22" width="12" height="44" rx="6" fill="url(#ac-r1)" opacity="0.7"/>
  </g>

  <!-- BL: stick (L) -->
  <g transform="translate(190, 820)" filter="url(#g-r1)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#ac-r1)" stroke-width="6" opacity="0.7"/>
    <circle cx="0" cy="0" r="22" fill="url(#ac-r1)" opacity="0.9"/>
  </g>
  <!-- BL: B button -->
  <g transform="translate(290, 740)" filter="url(#g-r1)">
    <circle cx="0" cy="0" r="26" fill="url(#ac-r1)" opacity="0.78"/>
    <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">B</text>
  </g>

  <!-- BR: X button -->
  <g transform="translate(840, 800)" filter="url(#g-r1)">
    <circle cx="0" cy="0" r="30" fill="url(#ac-r1)" opacity="0.85"/>
    <text x="0" y="9" text-anchor="middle" font-size="28" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">X</text>
  </g>
  <!-- BR: Y button -->
  <g transform="translate(740, 850)" filter="url(#g-r1)">
    <circle cx="0" cy="0" r="26" fill="url(#ac-r1)" opacity="0.75"/>
    <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">Y</text>
  </g>

  <!-- Center: EQ main hero -->
  <g transform="translate(512, 540)" filter="url(#g-r1)">
    <rect x="-300" y="-50" width="40" height="100" rx="20" fill="url(#ac-r1)" opacity="0.55"/>
    <rect x="-220" y="-120" width="40" height="240" rx="20" fill="url(#ac-r1)" opacity="0.72"/>
    <rect x="-140" y="-200" width="48" height="400" rx="24" fill="url(#ac-r1)"/>
    <rect x="-52" y="-260" width="48" height="520" rx="24" fill="url(#ac-r1)"/>
    <rect x="36" y="-170" width="48" height="340" rx="24" fill="url(#ac-r1)" opacity="0.92"/>
    <rect x="124" y="-100" width="40" height="200" rx="20" fill="url(#ac-r1)" opacity="0.75"/>
    <rect x="204" y="-60" width="40" height="120" rx="20" fill="url(#ac-r1)" opacity="0.55"/>
  </g>
</svg>
