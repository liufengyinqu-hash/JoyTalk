<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac-d" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <filter id="g-d"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg-d)"/>
  <ellipse cx="512" cy="500" rx="380" ry="160" fill="#22D3EE" opacity="0.18"/>

  <!-- Diagonal corner: top-left D-pad -->
  <g transform="translate(220, 220) rotate(-15)" filter="url(#g-d)" opacity="0.92">
    <rect x="-46" y="-14" width="92" height="28" rx="14" fill="url(#ac-d)"/>
    <rect x="-14" y="-46" width="28" height="92" rx="14" fill="url(#ac-d)"/>
  </g>
  <!-- Diagonal corner: bottom-right ABXY -->
  <g transform="translate(820, 800)" filter="url(#g-d)">
    <circle cx="0" cy="-44" r="18" fill="url(#ac-d)" opacity="0.9"/>
    <circle cx="-44" cy="0" r="18" fill="url(#ac-d)" opacity="0.85"/>
    <circle cx="44" cy="0" r="18" fill="url(#ac-d)" opacity="0.85"/>
    <circle cx="0" cy="44" r="18" fill="url(#ac-d)" opacity="0.7"/>
  </g>

  <!-- Center: EQ bars (slightly tilted vibe via uneven heights) -->
  <g transform="translate(512, 540)" filter="url(#g-d)">
    <rect x="-300" y="-50" width="40" height="100" rx="20" fill="url(#ac-d)" opacity="0.55"/>
    <rect x="-220" y="-120" width="40" height="240" rx="20" fill="url(#ac-d)" opacity="0.72"/>
    <rect x="-140" y="-200" width="48" height="400" rx="24" fill="url(#ac-d)"/>
    <rect x="-52" y="-260" width="48" height="520" rx="24" fill="url(#ac-d)"/>
    <rect x="36" y="-170" width="48" height="340" rx="24" fill="url(#ac-d)" opacity="0.92"/>
    <rect x="124" y="-100" width="40" height="200" rx="20" fill="url(#ac-d)" opacity="0.75"/>
    <rect x="204" y="-60" width="40" height="120" rx="20" fill="url(#ac-d)" opacity="0.55"/>
  </g>
</svg>
