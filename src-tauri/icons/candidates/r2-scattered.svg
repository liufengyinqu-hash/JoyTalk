<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-r2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac-r2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <filter id="g-r2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg-r2)"/>

  <!-- TL: stick (L) -->
  <g transform="translate(210, 230)" filter="url(#g-r2)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#ac-r2)" stroke-width="5" opacity="0.7"/>
    <circle cx="0" cy="0" r="20" fill="url(#ac-r2)" opacity="0.9"/>
  </g>
  <!-- TL: Y -->
  <g transform="translate(300, 320)" filter="url(#g-r2)">
    <circle cx="0" cy="0" r="22" fill="url(#ac-r2)" opacity="0.7"/>
    <text x="0" y="7" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">Y</text>
  </g>

  <!-- TR: minus + plus side by side -->
  <g transform="translate(800, 220)" filter="url(#g-r2)">
    <rect x="-50" y="-6" width="40" height="12" rx="6" fill="url(#ac-r2)" opacity="0.75"/>
    <rect x="14" y="-6" width="40" height="12" rx="6" fill="url(#ac-r2)" opacity="0.75"/>
    <rect x="28" y="-20" width="12" height="40" rx="6" fill="url(#ac-r2)" opacity="0.75"/>
  </g>
  <!-- TR: A -->
  <g transform="translate(720, 320)" filter="url(#g-r2)">
    <circle cx="0" cy="0" r="28" fill="url(#ac-r2)" opacity="0.85"/>
    <text x="0" y="9" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">A</text>
  </g>

  <!-- BL: B -->
  <g transform="translate(210, 800)" filter="url(#g-r2)">
    <circle cx="0" cy="0" r="28" fill="url(#ac-r2)" opacity="0.85"/>
    <text x="0" y="9" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">B</text>
  </g>
  <!-- BL: minus -->
  <g transform="translate(300, 720)" filter="url(#g-r2)">
    <rect x="-20" y="-6" width="40" height="12" rx="6" fill="url(#ac-r2)" opacity="0.7"/>
  </g>

  <!-- BR: stick (R) -->
  <g transform="translate(820, 820)" filter="url(#g-r2)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#ac-r2)" stroke-width="5" opacity="0.7"/>
    <circle cx="0" cy="0" r="20" fill="url(#ac-r2)" opacity="0.9"/>
  </g>
  <!-- BR: X -->
  <g transform="translate(720, 740)" filter="url(#g-r2)">
    <circle cx="0" cy="0" r="22" fill="url(#ac-r2)" opacity="0.75"/>
    <text x="0" y="7" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">X</text>
  </g>

  <!-- Center: EQ -->
  <g transform="translate(512, 540)" filter="url(#g-r2)">
    <rect x="-300" y="-50" width="40" height="100" rx="20" fill="url(#ac-r2)" opacity="0.55"/>
    <rect x="-220" y="-120" width="40" height="240" rx="20" fill="url(#ac-r2)" opacity="0.72"/>
    <rect x="-140" y="-200" width="48" height="400" rx="24" fill="url(#ac-r2)"/>
    <rect x="-52" y="-260" width="48" height="520" rx="24" fill="url(#ac-r2)"/>
    <rect x="36" y="-170" width="48" height="340" rx="24" fill="url(#ac-r2)" opacity="0.92"/>
    <rect x="124" y="-100" width="40" height="200" rx="20" fill="url(#ac-r2)" opacity="0.75"/>
    <rect x="204" y="-60" width="40" height="120" rx="20" fill="url(#ac-r2)" opacity="0.55"/>
  </g>
</svg>
