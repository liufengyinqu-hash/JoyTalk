<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ac2" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="ac2v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softhalo2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1024" height="1024" rx="240" fill="url(#bg2)"/>
  <!-- Cyan ambient halo behind bars -->
  <ellipse cx="512" cy="600" rx="380" ry="160" fill="#22D3EE" opacity="0.18" filter="url(#softhalo2)"/>

  <!-- Joy-Con accents: D-pad cluster (left) + ABXY dots (right), top -->
  <!-- Left mini D-pad -->
  <g transform="translate(220, 240)" opacity="0.85">
    <rect x="-46" y="-14" width="92" height="28" rx="14" fill="url(#ac2v)" filter="url(#glow2)"/>
    <rect x="-14" y="-46" width="28" height="92" rx="14" fill="url(#ac2v)" filter="url(#glow2)"/>
  </g>

  <!-- Right mini ABXY dots (diamond) -->
  <g transform="translate(804, 240)" filter="url(#glow2)">
    <circle cx="0" cy="-44" r="16" fill="url(#ac2)"/>
    <circle cx="-44" cy="0" r="16" fill="url(#ac2)" opacity="0.85"/>
    <circle cx="44" cy="0" r="16" fill="url(#ac2)" opacity="0.85"/>
    <circle cx="0" cy="44" r="16" fill="url(#ac2)" opacity="0.7"/>
  </g>

  <!-- Top side rails (Joy-Con SL/SR hint) -->
  <rect x="130" y="290" width="6" height="80" rx="3" fill="#22D3EE" opacity="0.45"/>
  <rect x="888" y="290" width="6" height="80" rx="3" fill="#22D3EE" opacity="0.45"/>

  <!-- Main waveform — EQ bars -->
  <g transform="translate(512, 600)" filter="url(#glow2)">
    <rect x="-360" y="-30" width="36" height="60" rx="18" fill="url(#ac2v)" opacity="0.45"/>
    <rect x="-280" y="-70" width="36" height="140" rx="18" fill="url(#ac2v)" opacity="0.6"/>
    <rect x="-200" y="-130" width="36" height="260" rx="18" fill="url(#ac2v)" opacity="0.78"/>
    <rect x="-120" y="-200" width="44" height="400" rx="22" fill="url(#ac2v)"/>
    <rect x="-32" y="-250" width="44" height="500" rx="22" fill="url(#ac2v)"/>
    <rect x="56" y="-180" width="44" height="360" rx="22" fill="url(#ac2v)" opacity="0.92"/>
    <rect x="144" y="-110" width="36" height="220" rx="18" fill="url(#ac2v)" opacity="0.78"/>
    <rect x="220" y="-150" width="36" height="300" rx="18" fill="url(#ac2v)" opacity="0.65"/>
    <rect x="296" y="-60" width="36" height="120" rx="18" fill="url(#ac2v)" opacity="0.5"/>
  </g>

  <!-- Subtle bottom rail (controller grip hint) -->
  <rect x="240" y="900" width="544" height="6" rx="3" fill="#22D3EE" opacity="0.25"/>
</svg>
