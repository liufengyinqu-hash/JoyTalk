<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="ac5" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#67E8F9"/><stop offset="100%" stop-color="#0E7490"/></linearGradient>
    <linearGradient id="ac5L" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#A5F3FC"/><stop offset="100%" stop-color="#22D3EE"/></linearGradient>
    <filter id="g5"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bg5)"/>
  <ellipse cx="512" cy="540" rx="380" ry="160" fill="#22D3EE" opacity="0.18"/>
  <!-- D-pad top-LEFT (brighter blue, distinct from ABXY) -->
  <g transform="translate(220, 220)" filter="url(#g5)">
    <rect x="-50" y="-16" width="100" height="32" rx="16" fill="url(#ac5L)"/>
    <rect x="-16" y="-50" width="32" height="100" rx="16" fill="url(#ac5L)"/>
  </g>
  <!-- ABXY bottom-RIGHT, with letters -->
  <g transform="translate(820, 820)" filter="url(#g5)">
    <circle cx="0" cy="-42" r="20" fill="url(#ac5)"/>
    <text x="0" y="-37" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">X</text>
    <circle cx="-42" cy="0" r="20" fill="url(#ac5)" opacity="0.85"/>
    <text x="-42" y="5" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">Y</text>
    <circle cx="42" cy="0" r="20" fill="url(#ac5)" opacity="0.85"/>
    <text x="42" y="5" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">A</text>
    <circle cx="0" cy="42" r="20" fill="url(#ac5)" opacity="0.7"/>
    <text x="0" y="47" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="-apple-system, sans-serif">B</text>
  </g>
  <!-- EQ -->
  <g transform="translate(512, 540)" filter="url(#g5)">
    <rect x="-300" y="-50" width="40" height="100" rx="20" fill="url(#ac5)" opacity="0.55"/>
    <rect x="-220" y="-120" width="40" height="240" rx="20" fill="url(#ac5)" opacity="0.72"/>
    <rect x="-140" y="-200" width="48" height="400" rx="24" fill="url(#ac5)"/>
    <rect x="-52" y="-260" width="48" height="520" rx="24" fill="url(#ac5)"/>
    <rect x="36" y="-170" width="48" height="340" rx="24" fill="url(#ac5)" opacity="0.92"/>
    <rect x="124" y="-100" width="40" height="200" rx="20" fill="url(#ac5)" opacity="0.75"/>
    <rect x="204" y="-60" width="40" height="120" rx="20" fill="url(#ac5)" opacity="0.55"/>
  </g>
</svg>
