    <rect x="-30" y="100" width="20" height="60" rx="6" fill="#0E7490" opacity="0.7"/>
    <!-- Concentric arcs -->
    <path d="M 80 -100 a 130 130 0 0 1 0 200" stroke="url(#ac5)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 160 -160 a 200 200 0 0 1 0 320" stroke="url(#ac5)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 240 -220 a 270 270 0 0 1 0 440" stroke="url(#ac5)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M 320 -280 a 340 340 0 0 1 0 560" stroke="url(#ac5)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.22"/>
  </g>
</svg>
